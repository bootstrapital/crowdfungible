# fly.toml app configuration file generated for rubot-demo on 2026-04-14T13:05:40-07:00
#
# See https://fly.io/docs/reference/configuration/ for information about how to use this file.
#

app = 'rubot-demo'
primary_region = 'sjc'
console_command = '/rails/bin/rails console'

[build]

[env]
  CABLE_DATABASE_PATH = '/data/production_cable.sqlite3'
  CACHE_DATABASE_PATH = '/data/production_cache.sqlite3'
  DATABASE_PATH = '/data/production.sqlite3'
  QUEUE_DATABASE_PATH = '/data/production_queue.sqlite3'
  RAILS_ENV = 'production'
  RAILS_LOG_TO_STDOUT = '1'
  RAILS_SERVE_STATIC_FILES = '1'
  SOLID_QUEUE_IN_PUMA = '1'

[[mounts]]
  source = 'data'
  destination = '/data'

[http_service]
  internal_port = 3000
  force_https = true
  auto_stop_machines = 'stop'
  auto_start_machines = true
  min_machines_running = 0
  processes = ['app']

  [[http_service.checks]]
    interval = '10s'
    timeout = '2s'
    grace_period = '5s'
    method = 'GET'
    path = '/up'
    protocol = 'http'
    tls_skip_verify = false

    [http_service.checks.headers]
      X-Forwarded-Proto = 'https'

[[vm]]
  memory = '1gb'
  cpu_kind = 'shared'
  cpus = 1
  memory_mb = 1024
